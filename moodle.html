<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJSZ HIGHSCHOOL</title>
    <link rel="stylesheet" href="moodle.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="about-us.html"class="logo-link">
                <img src="logo.png" alt="JJSZ Logo" class="circular-logo">
            </a>
            <span class="nav-brand">JJSZ HIGHSCHOOL</span>
        </div>
        <div class="nav-right">
            You are not logged in. (Log in)
        </div>
    </nav>

    <header class="page-header">
        <h1>JJSZ HIGHSCHOOL</h1>
        <div class="breadcrumb">Home</div>
    </header>

    <div class="dashboard-grid">
        <aside class="side-left">
            <div class="block">
                <div class="block-title">Main menu</div>
                <ul class="side-list">
                    <li>Site news</li>
                    <li>Abacus link</li>
                    <li>Teacher's e-mail</li>
                </ul>
            </div>

            <div class="block">
                <div class="block-title">Navigation</div>
                <ul class="side-list">
                    <li class="active">Home</li>
                    <li class="indent">Site news</li>
                    <li class="indent">Abacus link</li>
                    <li class="indent">Teacher's e-mail</li>
                    <li class="indent">▶ Courses</li>
                </ul>
            </div>

            <div class="block">
                <div class="block-title">Online users</div>
                <div class="block-content text-center">
                    No online users (last 5 minutes)
                </div>
            </div>
        </aside>

        <main class="main-banner">
            <img src="building.jpg" alt="Banner Image">
        </main>

        <aside class="side-right">
            <div class="block">
                <div class="block-title">Login</div>
                <form class="login-form">
                    <label>Username</label>
                    <input type="text">
                    <label>Password</label>
                    <input type="password">
                    <button type="submit" class="login-btn">Log in</button>
                    <a href="#" class="lost-pw">Lost password?</a>
                </form>
            </div>
        </aside>
    </div>

</body>
</html>
