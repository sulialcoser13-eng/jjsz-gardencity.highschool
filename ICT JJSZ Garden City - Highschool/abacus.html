<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JJSZ GardenCity Highschool</title>
    <link rel="stylesheet" href="abacus.css">
</head>
<body>

    <div class="login-container">
        <a href="about-us.html" class="back-arrow" title="Back to Home">&#8592;</a>

        <div class="header-section">
            <div class="logo">
                <span class="logo-icon">
                    <img src="abacus.png" alt="Logo">
                </span> 
                <span class="logo-text">Abacus</span>
            </div>
            <h2 class="school-name">JJSZ GardenCity Highschool</h2>
        </div>

        <div class="login-card">
            <div class="card-header">
                Please Sign In
            </div>
            <form class="card-body">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="card-footer">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="sign-in-btn">Sign In</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
